<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gramont S.A. - Matriz de Triaje de Cotizaciones</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
<script>
  // Fallback if CDN fails
  if (typeof window.jspdf === 'undefined') {
    var s = document.createElement('script');
    s.src = 'https://unpkg.com/jspdf@2.5.2/dist/jspdf.umd.min.js';
    document.head.appendChild(s);
  }
</script>
<style>
  :root {
    --gramont-blue: #1a3a5c;
    --gramont-light: #2c5f8a;
    --green: #2e7d32;
    --amber: #ef8c00;
    --red: #c62828;
    --bg: #f4f6f8;
    --card: #ffffff;
    --text: #1e293b;
    --muted: #64748b;
    --border: #d1d9e0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    padding: 16px;
  }

  .header {
    background: var(--gramont-blue);
    color: white;
    padding: 20px 24px;
    border-radius: 10px;
    margin-bottom: 20px;
  }

  .header h1 { font-size: 1.3rem; font-weight: 700; margin-bottom: 2px; }
  .header p { font-size: 0.85rem; opacity: 0.8; }

  .project-info {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    margin-bottom: 16px;
  }

  .project-info label {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  .project-info input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 0.95rem;
    color: var(--text);
    background: var(--bg);
  }

  .project-info input:focus {
    outline: none;
    border-color: var(--gramont-light);
    box-shadow: 0 0 0 3px rgba(44, 95, 138, 0.15);
  }

  .criteria-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    margin-bottom: 12px;
  }

  .criteria-section h2 {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--gramont-blue);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .criteria-section h2 .icon {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    background: var(--gramont-blue);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    font-weight: 700;
    flex-shrink: 0;
  }

  .criterion {
    margin-bottom: 14px;
    padding-bottom: 14px;
    border-bottom: 1px solid #eef1f5;
  }

  .criterion:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }

  .criterion-label {
    font-size: 0.88rem;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--text);
  }

  .criterion-desc {
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 8px;
    font-style: italic;
  }

  .options { display: flex; flex-direction: column; gap: 6px; }

  .option {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    background: white;
  }

  .option:hover { background: #f0f4f8; border-color: var(--gramont-light); }

  .option.selected {
    background: #e8f0f8;
    border-color: var(--gramont-light);
    box-shadow: 0 0 0 1px var(--gramont-light);
  }

  .option input[type="radio"] { display: none; }

  .radio-dot {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }

  .option.selected .radio-dot {
    border-color: var(--gramont-blue);
  }

  .option.selected .radio-dot::after {
    content: '';
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--gramont-blue);
  }

  .option-text {
    font-size: 0.85rem;
    flex: 1;
  }

  .score-badge {
    font-size: 0.72rem;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 10px;
    flex-shrink: 0;
  }

  .score-high { background: #e8f5e9; color: var(--green); }
  .score-med { background: #fff3e0; color: var(--amber); }
  .score-low { background: #fce4ec; color: var(--red); }

  .result-card {
    border-radius: 10px;
    padding: 20px;
    margin-top: 16px;
    text-align: center;
    transition: all 0.3s;
  }

  .result-card.pending {
    background: var(--card);
    border: 2px dashed var(--border);
  }

  .result-card.nivel-1 {
    background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
    border: 2px solid var(--green);
  }

  .result-card.nivel-2 {
    background: linear-gradient(135deg, #fff3e0, #ffe0b2);
    border: 2px solid var(--amber);
  }

  .result-card.nivel-3 {
    background: linear-gradient(135deg, #fce4ec, #f8bbd0);
    border: 2px solid var(--red);
  }

  .result-level {
    font-size: 1.4rem;
    font-weight: 800;
    margin-bottom: 4px;
  }

  .result-name { font-size: 1rem; font-weight: 600; margin-bottom: 8px; }

  .result-details {
    font-size: 0.82rem;
    line-height: 1.6;
    text-align: left;
    margin-top: 12px;
  }

  .result-details table {
    width: 100%;
    border-collapse: collapse;
  }

  .result-details td {
    padding: 5px 0;
    font-size: 0.82rem;
    vertical-align: top;
  }

  .result-details td:first-child {
    font-weight: 600;
    width: 40%;
    color: var(--muted);
  }

  .result-score {
    font-size: 2rem;
    font-weight: 800;
    margin: 6px 0;
  }

  .result-bar {
    height: 8px;
    background: rgba(0,0,0,0.1);
    border-radius: 4px;
    margin: 10px auto;
    max-width: 280px;
    overflow: hidden;
    position: relative;
  }

  .result-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.5s ease;
  }

  .btn-reset {
    margin-top: 14px;
    padding: 10px 24px;
    background: var(--gramont-blue);
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn-reset:hover { background: var(--gramont-light); }

  .btn-pdf {
    margin-top: 14px;
    margin-left: 8px;
    padding: 10px 24px;
    background: #c62828;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-pdf:hover { background: #d32f2f; }
  .btn-pdf:disabled { background: #999; cursor: wait; }

  .result-buttons { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }

  .weight-tag {
    font-size: 0.68rem;
    background: var(--gramont-blue);
    color: white;
    padding: 1px 6px;
    border-radius: 8px;
    margin-left: 6px;
    font-weight: 600;
  }

  .btn-pdf {
    margin-top: 14px;
    margin-left: 8px;
    padding: 10px 24px;
    background: #2e7d32;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-pdf:hover { background: #388e3c; }
</style>
</head>
<body>

<div class="header">
  <h1>Matriz de Triaje de Cotizaciones</h1>
  <p>Gramont S.A. — Clasificación rápida de pedidos de precio</p>
</div>

<div class="project-info">
  <label>Nombre del pedido / Obra / Cliente</label>
  <input type="text" id="projectName" placeholder="Ej: Tablero CCM - Planta Renault Córdoba">
</div>

<div id="criteriaContainer"></div>
<div id="resultContainer"></div>

<script>
const criteria = [
  {
    section: "Probabilidad comercial",
    icon: "A",
    items: [
      {
        id: "relacion",
        label: "Relación con el cliente",
        desc: "¿Ya trabajaron juntos? ¿Los conoce?",
        weight: 3,
        options: [
          { text: "Cliente recurrente / nos pidió directamente", score: 3 },
          { text: "Cliente conocido pero no recurrente", score: 2 },
          { text: "Cliente nuevo, contacto directo", score: 1.5 },
          { text: "Licitación abierta / sin relación previa", score: 0.5 }
        ]
      },
      {
        id: "competencia",
        label: "Nivel de competencia",
        desc: "¿Cuántos oferentes hay? ¿Estamos bien posicionados?",
        weight: 2,
        options: [
          { text: "Somos los únicos o hay 1-2 competidores", score: 3 },
          { text: "3-5 competidores, tenemos ventaja técnica", score: 2 },
          { text: "Más de 5 competidores, sin ventaja clara", score: 1 },
          { text: "Licitación masiva / solo comparar precio", score: 0.5 }
        ]
      },
      {
        id: "urgencia",
        label: "Plazo para cotizar",
        desc: "¿Cuánto tiempo tenemos para entregar la oferta?",
        weight: 2,
        options: [
          { text: "Más de 15 días hábiles", score: 3 },
          { text: "7 a 15 días hábiles", score: 2 },
          { text: "3 a 7 días hábiles", score: 1 },
          { text: "Menos de 3 días hábiles", score: 0.5 }
        ]
      }
    ]
  },
  {
    section: "Valor estratégico",
    icon: "B",
    items: [
      {
        id: "monto",
        label: "Monto estimado de la obra",
        desc: "Orden de magnitud del valor del contrato",
        weight: 2,
        options: [
          { text: "Grande (> USD 600k)", score: 3 },
          { text: "Mediana (USD 150k - 600k)", score: 2 },
          { text: "Chica (USD 30k - 150k)", score: 1 },
          { text: "Muy chica (< USD 30k)", score: 0.5 }
        ]
      },
      {
        id: "estrategia",
        label: "Valor estratégico más allá del monto",
        desc: "¿Abre un mercado nuevo? ¿Es referencia para otras obras?",
        weight: 1.5,
        options: [
          { text: "Alta: nuevo mercado, cliente ancla, proyecto referente", score: 3 },
          { text: "Media: fortalece relación existente", score: 2 },
          { text: "Baja: obra puntual sin proyección", score: 1 },
          { text: "Nula: solo precio, sin continuidad", score: 0.5 }
        ]
      }
    ]
  },
  {
    section: "Complejidad técnica",
    icon: "C",
    items: [
      {
        id: "alcance",
        label: "Tipo de alcance",
        desc: "¿Qué disciplinas involucra la cotización?",
        weight: 2,
        options: [
          { text: "Un solo rubro conocido (tablero, montaje o ingeniería)", score: 3 },
          { text: "Dos rubros combinados", score: 2 },
          { text: "Multidisciplinar (tableros + montaje + ingeniería + civil)", score: 1 },
          { text: "Alcance indefinido / llave en mano sin especificación", score: 0.5 }
        ]
      },
      {
        id: "info",
        label: "Calidad de la información recibida",
        desc: "¿El pedido viene con planos, ET, memoria o hay que relevar?",
        weight: 2,
        options: [
          { text: "Documentación completa (planos, ET, unifilares)", score: 3 },
          { text: "Documentación parcial, alcance definido", score: 2 },
          { text: "Solo descripción general, hay que asumir bastante", score: 1 },
          { text: "Casi nada, requiere relevamiento previo", score: 0.5 }
        ]
      },
      {
        id: "novedad",
        label: "Novedad técnica",
        desc: "¿Es algo que ya hicieron antes o hay que investigar?",
        weight: 1.5,
        options: [
          { text: "Hicimos algo muy similar antes, tenemos antecedentes", score: 3 },
          { text: "Similar a trabajos previos con variantes", score: 2 },
          { text: "Parcialmente nuevo, requiere estudio", score: 1 },
          { text: "Tecnología o alcance totalmente nuevo para nosotros", score: 0.5 }
        ]
      }
    ]
  }
];

const levels = [
  {
    name: "Nivel 1 — Cotización Paramétrica",
    className: "nivel-1",
    color: "#2e7d32",
    plazo: "1 a 3 días hábiles",
    alcanceIng: "Mínima: usar configuraciones tipo y costos unitarios históricos",
    documentacion: "Presupuesto resumido + mail comercial",
    responsable: "1 persona (comercial o técnico junior)",
    criterio: "Pedido de baja complejidad con buena info, o pedido donde hay que responder rápido para no quedar afuera"
  },
  {
    name: "Nivel 2 — Cotización Estándar",
    className: "nivel-2",
    color: "#ef8c00",
    plazo: "5 a 10 días hábiles",
    alcanceIng: "Preliminar: dimensionamiento de equipos principales, selección de componentes, pedido de precios clave",
    documentacion: "Oferta comercial + memoria técnica resumida + lista de materiales",
    responsable: "2 personas (ingeniero + comercial)",
    criterio: "Pedido con probabilidad media-alta de cierre, complejidad moderada"
  },
  {
    name: "Nivel 3 — Cotización con Ingeniería",
    className: "nivel-3",
    color: "#c62828",
    plazo: "10 a 20 días hábiles",
    alcanceIng: "Detallada: unifilares, cálculos de cables/protecciones, arquitectura de control, planos preliminares",
    documentacion: "Carta oferta formal + memoria técnica completa + planos + APU detallada",
    responsable: "Equipo completo (ingeniero senior + proyectista + comercial)",
    criterio: "Obra grande o estratégica, cliente exige documentación completa, alta probabilidad de cierre"
  }
];

function getSelections() {
  const selections = {};
  criteria.forEach(section => {
    section.items.forEach(item => {
      const selected = document.querySelector(`input[name="${item.id}"]:checked`);
      if (selected) {
        selections[item.id] = {
          score: parseFloat(selected.value),
          weight: item.weight
        };
      }
    });
  });
  return selections;
}

function getTotalItems() {
  return criteria.reduce((sum, s) => sum + s.items.length, 0);
}

function calculateScore(selections) {
  let weightedSum = 0;
  let totalWeight = 0;
  Object.values(selections).forEach(s => {
    weightedSum += s.score * s.weight;
    totalWeight += s.weight;
  });
  if (totalWeight === 0) return 0;
  return weightedSum / totalWeight;
}

function getLevel(score) {
  if (score >= 2.2) return 0;
  if (score >= 1.3) return 1;
  return 2;
}

function getScoreBadgeClass(score) {
  if (score >= 3) return "score-high";
  if (score >= 2) return "score-med";
  return "score-low";
}

function renderCriteria() {
  const container = document.getElementById('criteriaContainer');
  container.innerHTML = '';

  criteria.forEach(section => {
    const sectionDiv = document.createElement('div');
    sectionDiv.className = 'criteria-section';

    let html = `<h2><span class="icon">${section.icon}</span>${section.section}</h2>`;

    section.items.forEach(item => {
      html += `
        <div class="criterion">
          <div class="criterion-label">${item.label}<span class="weight-tag">Peso: ${item.weight}x</span></div>
          <div class="criterion-desc">${item.desc}</div>
          <div class="options">
      `;
      item.options.forEach((opt, oi) => {
        const badgeClass = getScoreBadgeClass(opt.score);
        html += `
          <label class="option" id="opt-${item.id}-${oi}">
            <input type="radio" name="${item.id}" value="${opt.score}" onchange="selectOption('${item.id}', ${oi})">
            <span class="radio-dot"></span>
            <span class="option-text">${opt.text}</span>
            <span class="score-badge ${badgeClass}">${opt.score}</span>
          </label>
        `;
      });
      html += `</div></div>`;
    });

    sectionDiv.innerHTML = html;
    container.appendChild(sectionDiv);
  });
}

function selectOption(itemId, optIndex) {
  document.querySelectorAll(`label[id^="opt-${itemId}-"]`).forEach(el => el.classList.remove('selected'));
  document.getElementById(`opt-${itemId}-${optIndex}`).classList.add('selected');
  updateResult();
}

function updateResult() {
  const selections = getSelections();
  const total = getTotalItems();
  const answered = Object.keys(selections).length;
  const container = document.getElementById('resultContainer');

  if (answered < total) {
    container.innerHTML = `
      <div class="result-card pending">
        <div style="font-size:0.9rem; color: var(--muted);">
          Respondé los ${total} criterios para ver la clasificación<br>
          <strong>${answered} de ${total}</strong> completados
        </div>
        <div class="result-bar">
          <div class="result-bar-fill" style="width: ${(answered/total)*100}%; background: var(--gramont-light);"></div>
        </div>
      </div>
    `;
    return;
  }

  const score = calculateScore(selections);
  const levelIdx = getLevel(score);
  const level = levels[levelIdx];
  const pct = ((score / 3) * 100).toFixed(0);
  const projectName = document.getElementById('projectName').value || '(sin nombre)';

  container.innerHTML = `
    <div class="result-card ${level.className}">
      <div class="result-level">${level.name}</div>
      <div class="result-score" style="color: ${level.color}">${score.toFixed(2)} / 3.00</div>
      <div class="result-bar">
        <div class="result-bar-fill" style="width: ${pct}%; background: ${level.color};"></div>
      </div>
      <div style="font-size:0.78rem; color: var(--muted); margin: 6px 0 0;">Obra: <strong>${projectName}</strong></div>
      <div class="result-details">
        <table>
          <tr><td>Plazo de cotización:</td><td>${level.plazo}</td></tr>
          <tr><td>Ingeniería:</td><td>${level.alcanceIng}</td></tr>
          <tr><td>Documentación:</td><td>${level.documentacion}</td></tr>
          <tr><td>Recursos:</td><td>${level.responsable}</td></tr>
          <tr><td>Criterio:</td><td>${level.criterio}</td></tr>
        </table>
      </div>
      <button class="btn-reset" onclick="resetForm()">Nueva evaluación</button>
      <button class="btn-pdf" onclick="exportPDF()">📄 Guardar PDF</button>
    </div>
  `;
}

function resetForm() {
  document.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
  document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  document.getElementById('projectName').value = '';
  updateResult();
}

function exportPDF() {
  const selections = getSelections();
  const total = getTotalItems();
  const answered = Object.keys(selections).length;
  if (answered < total) { alert('Completá todos los criterios antes de exportar.'); return; }

  const btn = document.querySelector('.btn-pdf');
  btn.disabled = true;
  btn.textContent = 'Generando...';

  const score = calculateScore(selections);
  const levelIdx = getLevel(score);
  const level = levels[levelIdx];
  const pct = ((score / 3) * 100).toFixed(0);
  const projectName = document.getElementById('projectName').value || '(sin nombre)';
  const fecha = new Date().toLocaleDateString('es-AR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });

  try {
    const jsPDFClass = (window.jspdf && window.jspdf.jsPDF) || window.jsPDF;
    if (!jsPDFClass) { alert('No se pudo cargar la librería PDF. Verificá tu conexión a internet y recargá la página.'); btn.disabled = false; btn.textContent = '📄 Guardar PDF'; return; }
    const doc = new jsPDFClass({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const W = 210, H = 297;
    const ml = 20, mr = 20, mt = 20;
    const cw = W - ml - mr;
    let y = mt;

    // --- Header bar ---
    doc.setFillColor(26, 58, 92);
    doc.rect(0, 0, W, 32, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(16);
    doc.setFont('helvetica', 'bold');
    doc.text('Matriz de Triaje de Cotizaciones', ml, 14);
    doc.setFontSize(9);
    doc.setFont('helvetica', 'normal');
    doc.text('Gramont S.A. — Clasificación rápida de pedidos de precio', ml, 22);
    doc.setFontSize(8);
    doc.text(fecha, W - mr, 22, { align: 'right' });

    y = 42;

    // --- Project name ---
    doc.setTextColor(30, 41, 59);
    doc.setFontSize(11);
    doc.setFont('helvetica', 'bold');
    doc.text('Obra / Pedido:', ml, y);
    doc.setFont('helvetica', 'normal');
    doc.text(projectName, ml + 35, y);
    y += 10;

    // --- Result box ---
    const levelColors = { 0: [46,125,50], 1: [239,140,0], 2: [198,40,40] };
    const bgColors = { 0: [232,245,233], 1: [255,243,224], 2: [252,228,236] };
    const lc = levelColors[levelIdx];
    const bc = bgColors[levelIdx];

    doc.setFillColor(bc[0], bc[1], bc[2]);
    doc.setDrawColor(lc[0], lc[1], lc[2]);
    doc.setLineWidth(0.8);
    doc.roundedRect(ml, y, cw, 52, 3, 3, 'FD');

    doc.setTextColor(lc[0], lc[1], lc[2]);
    doc.setFontSize(14);
    doc.setFont('helvetica', 'bold');
    doc.text(level.name, W / 2, y + 12, { align: 'center' });

    doc.setFontSize(22);
    doc.text(`${score.toFixed(2)} / 3.00`, W / 2, y + 24, { align: 'center' });

    // Progress bar
    const barX = ml + 30, barY = y + 28, barW = cw - 60, barH = 4;
    doc.setFillColor(200, 200, 200);
    doc.roundedRect(barX, barY, barW, barH, 2, 2, 'F');
    doc.setFillColor(lc[0], lc[1], lc[2]);
    doc.roundedRect(barX, barY, barW * pct / 100, barH, 2, 2, 'F');

    // Level details inside box
    doc.setFontSize(8);
    doc.setTextColor(80, 80, 80);
    doc.setFont('helvetica', 'normal');
    const detailY = y + 37;
    const detailItems = [
      ['Plazo:', level.plazo],
      ['Recursos:', level.responsable],
      ['Documentación:', level.documentacion]
    ];
    detailItems.forEach((d, i) => {
      doc.setFont('helvetica', 'bold');
      doc.text(d[0], ml + 6, detailY + i * 5);
      doc.setFont('helvetica', 'normal');
      doc.text(d[1], ml + 32, detailY + i * 5);
    });

    y += 60;

    // --- Detail of selections ---
    doc.setTextColor(26, 58, 92);
    doc.setFontSize(11);
    doc.setFont('helvetica', 'bold');
    doc.text('Detalle de la evaluación', ml, y);
    y += 3;
    doc.setDrawColor(26, 58, 92);
    doc.setLineWidth(0.4);
    doc.line(ml, y, ml + cw, y);
    y += 6;

    criteria.forEach(section => {
      // Check if we need a page break
      if (y > H - 40) { doc.addPage(); y = mt; }

      doc.setFillColor(240, 244, 248);
      doc.roundedRect(ml, y - 3, cw, 7, 1.5, 1.5, 'F');
      doc.setTextColor(26, 58, 92);
      doc.setFontSize(9);
      doc.setFont('helvetica', 'bold');
      doc.text(section.section, ml + 4, y + 1.5);
      y += 9;

      section.items.forEach(item => {
        if (y > H - 25) { doc.addPage(); y = mt; }

        const sel = selections[item.id];
        doc.setTextColor(30, 41, 59);
        doc.setFontSize(8.5);
        doc.setFont('helvetica', 'bold');
        doc.text(`${item.label}  (peso ${item.weight}x)`, ml + 2, y);

        if (sel) {
          const selectedOpt = item.options.find(o => o.score === sel.score);
          const selText = selectedOpt ? selectedOpt.text : '—';
          doc.setFont('helvetica', 'normal');
          doc.setTextColor(80, 80, 80);

          const lines = doc.splitTextToSize(`→ ${selText}  [${sel.score}]`, cw - 10);
          y += 4;
          lines.forEach(line => {
            doc.text(line, ml + 6, y);
            y += 3.8;
          });
        }
        y += 3;
      });
      y += 3;
    });

    // --- Ingeniería recomendada ---
    if (y > H - 45) { doc.addPage(); y = mt; }
    y += 2;
    doc.setTextColor(26, 58, 92);
    doc.setFontSize(11);
    doc.setFont('helvetica', 'bold');
    doc.text('Alcance de ingeniería recomendado', ml, y);
    y += 3;
    doc.line(ml, y, ml + cw, y);
    y += 6;

    doc.setTextColor(30, 41, 59);
    doc.setFontSize(8.5);
    doc.setFont('helvetica', 'normal');
    const ingLines = doc.splitTextToSize(level.alcanceIng, cw - 4);
    ingLines.forEach(l => { doc.text(l, ml + 2, y); y += 4; });
    y += 3;

    doc.setFont('helvetica', 'bold');
    doc.text('Criterio de aplicación:', ml + 2, y);
    y += 4;
    doc.setFont('helvetica', 'normal');
    const critLines = doc.splitTextToSize(level.criterio, cw - 4);
    critLines.forEach(l => { doc.text(l, ml + 2, y); y += 4; });

    // --- Footer ---
    const addFooter = (pageNum, totalPages) => {
      doc.setFillColor(245, 247, 249);
      doc.rect(0, H - 12, W, 12, 'F');
      doc.setTextColor(150, 150, 150);
      doc.setFontSize(7);
      doc.setFont('helvetica', 'normal');
      doc.text('Gramont S.A. — Matriz de Triaje — Documento generado automáticamente', ml, H - 5);
      doc.text(`Pág. ${pageNum}/${totalPages}`, W - mr, H - 5, { align: 'right' });
    };

    const totalPages = doc.getNumberOfPages();
    for (let p = 1; p <= totalPages; p++) {
      doc.setPage(p);
      addFooter(p, totalPages);
    }

    // Save
    const safeName = projectName.replace(/[^a-zA-Z0-9áéíóúñÁÉÍÓÚÑ\s\-_]/g, '').replace(/\s+/g, '_') || 'triaje';
    doc.save(`Triaje_${safeName}_${new Date().toISOString().slice(0,10)}.pdf`);

  } catch (err) {
    alert('Error al generar PDF: ' + err.message);
    console.error(err);
  } finally {
    btn.disabled = false;
    btn.textContent = '📄 Guardar PDF';
  }
}

renderCriteria();
updateResult();

function exportPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  const pw = 210, ph = 297;
  const ml = 20, mr = 20, contentW = pw - ml - mr;
  let y = 0;

  const selections = getSelections();
  const score = calculateScore(selections);
  const levelIdx = getLevel(score);
  const level = levels[levelIdx];
  const projectName = document.getElementById('projectName').value || '(sin nombre)';
  const fecha = new Date().toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit', year: 'numeric' });
  const hora = new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });

  // Colors
  const blue = [26, 58, 92];
  const blueLight = [44, 95, 138];
  const green = [46, 125, 50];
  const amber = [239, 140, 0];
  const red = [198, 40, 40];
  const gray = [100, 116, 139];
  const levelColors = [green, amber, red];
  const lc = levelColors[levelIdx];

  // === HEADER BAR ===
  doc.setFillColor(...blue);
  doc.rect(0, 0, pw, 36, 'F');
  doc.setTextColor(255, 255, 255);
  doc.setFontSize(16);
  doc.setFont('helvetica', 'bold');
  doc.text('GRAMONT S.A.', ml, 14);
  doc.setFontSize(10);
  doc.setFont('helvetica', 'normal');
  doc.text('Matriz de Triaje de Cotizaciones', ml, 22);
  doc.setFontSize(8);
  doc.text(`Fecha: ${fecha}  —  ${hora}`, pw - mr, 14, { align: 'right' });
  doc.text('IRAM-ISO 9001 / 14001 / 45001', pw - mr, 22, { align: 'right' });
  y = 44;

  // === PROJECT NAME ===
  doc.setFillColor(244, 246, 248);
  doc.roundedRect(ml, y, contentW, 14, 2, 2, 'F');
  doc.setTextColor(...gray);
  doc.setFontSize(8);
  doc.setFont('helvetica', 'bold');
  doc.text('OBRA / PEDIDO:', ml + 4, y + 5);
  doc.setTextColor(...blue);
  doc.setFontSize(11);
  doc.setFont('helvetica', 'bold');
  doc.text(projectName, ml + 4, y + 11);
  y += 20;

  // === RESULT BOX ===
  doc.setFillColor(...lc);
  doc.roundedRect(ml, y, contentW, 30, 3, 3, 'F');
  doc.setTextColor(255, 255, 255);
  doc.setFontSize(14);
  doc.setFont('helvetica', 'bold');
  doc.text(level.name, pw / 2, y + 10, { align: 'center' });
  doc.setFontSize(20);
  doc.text(`${score.toFixed(2)} / 3.00`, pw / 2, y + 22, { align: 'center' });

  // Score bar
  const barX = ml + 30, barW = contentW - 60, barH = 3;
  const barY2 = y + 26;
  doc.setFillColor(255, 255, 255, 80);
  doc.setDrawColor(255, 255, 255);
  doc.roundedRect(barX, barY2, barW, barH, 1, 1, 'FD');
  const fillW = barW * (score / 3);
  doc.setFillColor(255, 255, 255);
  doc.roundedRect(barX, barY2, fillW, barH, 1, 1, 'F');
  y += 36;

  // === RECOMMENDATION TABLE ===
  doc.setFontSize(9);
  doc.setFont('helvetica', 'bold');
  doc.setTextColor(...blue);
  doc.text('RECOMENDACIÓN', ml, y);
  y += 4;

  const recRows = [
    ['Plazo de cotización', level.plazo],
    ['Ingeniería', level.alcanceIng],
    ['Documentación', level.documentacion],
    ['Recursos', level.responsable],
    ['Criterio', level.criterio]
  ];

  recRows.forEach((row, i) => {
    const bgColor = i % 2 === 0 ? [244, 246, 248] : [255, 255, 255];
    doc.setFillColor(...bgColor);
    doc.rect(ml, y, contentW, 8, 'F');
    doc.setFontSize(7.5);
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(...gray);
    doc.text(row[0] + ':', ml + 3, y + 5.5);
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(30, 41, 59);
    const lines = doc.splitTextToSize(row[1], contentW - 55);
    const lineH = lines.length > 1 ? lines.length * 3.5 : 0;
    if (lines.length > 1) {
      doc.setFillColor(...bgColor);
      doc.rect(ml, y, contentW, 5 + lineH, 'F');
      doc.text(lines, ml + 52, y + 5.5);
      y += 5 + lineH;
    } else {
      doc.text(row[1], ml + 52, y + 5.5);
      y += 8;
    }
  });
  y += 6;

  // === CRITERIA DETAIL ===
  doc.setFontSize(9);
  doc.setFont('helvetica', 'bold');
  doc.setTextColor(...blue);
  doc.text('DETALLE DE CRITERIOS EVALUADOS', ml, y);
  y += 5;

  criteria.forEach(section => {
    // Section header
    doc.setFillColor(...blueLight);
    doc.roundedRect(ml, y, contentW, 7, 1, 1, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(8);
    doc.setFont('helvetica', 'bold');
    doc.text(`${section.icon}  ${section.section}`, ml + 3, y + 5);
    y += 9;

    section.items.forEach(item => {
      const sel = selections[item.id];
      if (!sel) return;
      
      // Find selected option text
      const selOpt = item.options.find(o => o.score === sel.score);
      const selText = selOpt ? selOpt.text : '—';
      const selScore = sel.score;

      // Criterion row
      doc.setFillColor(250, 251, 252);
      doc.rect(ml, y, contentW, 10, 'F');
      
      // Score circle
      const circleColor = selScore >= 2.5 ? green : selScore >= 1.5 ? amber : red;
      doc.setFillColor(...circleColor);
      doc.circle(ml + 5, y + 5, 3, 'F');
      doc.setTextColor(255, 255, 255);
      doc.setFontSize(7);
      doc.setFont('helvetica', 'bold');
      doc.text(String(selScore), ml + 5, y + 6.2, { align: 'center' });

      // Label
      doc.setTextColor(30, 41, 59);
      doc.setFontSize(7.5);
      doc.setFont('helvetica', 'bold');
      doc.text(`${item.label}  (peso: ${item.weight}x)`, ml + 12, y + 4);
      
      // Selected option
      doc.setFont('helvetica', 'normal');
      doc.setTextColor(...gray);
      doc.setFontSize(7);
      const optLines = doc.splitTextToSize(selText, contentW - 16);
      doc.text(optLines, ml + 12, y + 8);
      y += optLines.length > 1 ? 10 + (optLines.length - 1) * 3 : 11;

      if (y > ph - 30) {
        doc.addPage();
        y = 20;
      }
    });
    y += 3;
  });

  // === FOOTER ===
  y = Math.max(y, ph - 20);
  if (y > ph - 15) { doc.addPage(); y = ph - 20; }
  doc.setDrawColor(...blueLight);
  doc.line(ml, ph - 15, pw - mr, ph - 15);
  doc.setTextColor(...gray);
  doc.setFontSize(6.5);
  doc.setFont('helvetica', 'normal');
  doc.text('Gramont S.A. — Olavarría, Buenos Aires, Argentina', ml, ph - 10);
  doc.text('Documento generado automáticamente — Uso interno', pw - mr, ph - 10, { align: 'right' });

  // Save
  const safeName = projectName.replace(/[^a-zA-Z0-9áéíóúñÁÉÍÓÚÑ ]/g, '').replace(/\s+/g, '_').substring(0, 40);
  doc.save(`Triaje_${safeName}_${fecha.replace(/\//g, '-')}.pdf`);
}
</script>
